name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        include:
          # Python 3.8 is EOL; pre-built binaries may disappear from the runner
          # image cache at any time.  We still want to know when it breaks, but
          # we don't want it to block the whole pipeline.
          - python-version: "3.8"
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov pytz requests websockets
      - name: Run unit and integration tests
        run: >
          pytest tests/unit/ tests/integration/
          --cov=resources/lib
          --cov-report=term-missing
